$kind: http-request
name: 'PATCH Update Inquiry Status (Admin)'
method: PATCH
url: '{{baseUrl}}/api/inquiries/{{inquiryId}}/status'
order: 3000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{adminToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "status": "reviewed"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", function () {
        pm.response.to.have.status(200);
      });
      pm.test("Response has success: true", function () {
        const json = pm.response.json();
        pm.expect(json.success).to.be.true;
      });
      pm.test("Inquiry status updated", function () {
        const json = pm.response.json();
        pm.expect(json.data.status).to.equal("reviewed");
      });
