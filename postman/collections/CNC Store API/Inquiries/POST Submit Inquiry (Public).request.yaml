$kind: http-request
name: 'POST Submit Inquiry (Public)'
method: POST
url: '{{baseUrl}}/api/inquiries'
order: 1000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "fullName": "John Doe",
      "email": "john.doe@example.com",
      "phone": "+923001234567",
      "city": "Karachi",
      "message": "I am interested in your marble products for my home renovation project."
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 201", function () {
        pm.response.to.have.status(201);
      });
      pm.test("Response has success: true", function () {
        const json = pm.response.json();
        pm.expect(json.success).to.be.true;
      });
      pm.test("Response data has id", function () {
        const json = pm.response.json();
        pm.expect(json.data).to.have.property("id");
        if (json.data && json.data.id) {
          pm.environment.set("inquiryId", json.data.id);
        }
      });
