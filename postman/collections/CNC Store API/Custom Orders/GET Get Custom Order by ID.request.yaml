$kind: http-request
name: GET Get Custom Order by ID
method: GET
url: '{{baseUrl}}/api/custom-orders/{{customOrderId}}'
order: 4000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{authToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", function () {
        pm.response.to.have.status(200);
      });
      pm.test("Response has success: true", function () {
        const json = pm.response.json();
        pm.expect(json.success).to.be.true;
      });
      pm.test("Response data.id equals customOrderId variable", function () {
        const json = pm.response.json();
        const customOrderId = pm.collectionVariables.get("customOrderId");
        pm.expect(String(json.data.id)).to.eql(String(customOrderId));
      });
