$kind: http-request
name: GET List Products
method: GET
url: '{{baseUrl}}/api/products'
order: 1000
queryParams:
  - key: page
    value: '1'
  - key: pageSize
    value: '10'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", function () {
        pm.response.to.have.status(200);
      });
      pm.test("Response has success: true", function () {
        const json = pm.response.json();
        pm.expect(json.success).to.be.true;
      });
      pm.test("Response data is an array or paginated object", function () {
        const json = pm.response.json();
        pm.expect(json.data).to.exist;
        const isArray = Array.isArray(json.data);
        const isObject = typeof json.data === "object";
        pm.expect(isArray || isObject).to.be.true;
      });
      pm.test("Response time is less than 2000ms", function () {
        pm.expect(pm.response.responseTime).to.be.below(2000);
      });
